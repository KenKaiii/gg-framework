<!doctype html>
<!--
  Source for the NSIS page header strip (final BMP is 150×57; rendered here at
  2× = 300×114 then downscaled). NSIS draws this top-right, so content is
  right-aligned. Regenerate with: pnpm --filter gg-app installer:art
-->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 300px;
        height: 114px;
        overflow: hidden;
        font-family: -apple-system, "SF Pro Display", Segoe UI, system-ui, sans-serif;
      }
      .bar {
        width: 300px;
        height: 114px;
        background:
          radial-gradient(
            90% 140% at 100% 0%,
            rgba(77, 157, 255, 0.20),
            transparent 60%
          ),
          linear-gradient(180deg, #141720 0%, #0e1015 100%);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
        padding: 0 22px;
        color: #f4f6f8;
      }
      .name {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .name .g {
        background: linear-gradient(135deg, #4d9dff, #9b8cf7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        filter: drop-shadow(0 4px 12px rgba(77, 157, 255, 0.45));
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="name"><span class="g">GG</span> Coder</div>
      <img class="logo" src="logo.png" alt="" />
    </div>
  </body>
</html>

<!doctype html>
<!--
  Source for the NSIS Welcome/Finish sidebar (final BMP is 164×314; rendered
  here at 2× = 328×628 then downscaled for crispness). Regenerate with:
  pnpm --filter gg-app installer:art
-->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 328px;
        height: 628px;
        overflow: hidden;
        font-family: -apple-system, "SF Pro Display", Segoe UI, system-ui, sans-serif;
      }
      .panel {
        position: relative;
        width: 328px;
        height: 628px;
        background:
          radial-gradient(
            120% 50% at 50% 0%,
            rgba(77, 157, 255, 0.22),
            transparent 60%
          ),
          radial-gradient(
            120% 50% at 50% 100%,
            rgba(155, 140, 247, 0.18),
            transparent 60%
          ),
          linear-gradient(180deg, #141720 0%, #0c0e13 100%);
        color: #f4f6f8;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 26px 26px;
        mask-image: radial-gradient(80% 60% at 50% 38%, #000 20%, transparent 75%);
      }
      .logo {
        margin-top: 150px;
        width: 132px;
        height: 132px;
        border-radius: 28px;
        filter: drop-shadow(0 14px 36px rgba(77, 157, 255, 0.40));
        position: relative;
        z-index: 1;
      }
      .name {
        margin-top: 34px;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.03em;
        z-index: 1;
      }
      .name .g {
        background: linear-gradient(135deg, #4d9dff, #9b8cf7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .tag {
        margin-top: 12px;
        font-size: 19px;
        color: #9aa3b2;
        z-index: 1;
      }
      .rule {
        margin-top: 26px;
        width: 64px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, #4d9dff, #9b8cf7);
        z-index: 1;
      }
      .foot {
        position: absolute;
        bottom: 34px;
        font-size: 16px;
        color: #5b6472;
        letter-spacing: 0.04em;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <img class="logo" src="logo.png" alt="" />
      <div class="name"><span class="g">GG</span> Coder</div>
      <div class="tag">the coding agent</div>
      <div class="rule"></div>
      <div class="foot">on your desktop</div>
    </div>
  </body>
</html>

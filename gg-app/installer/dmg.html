<!doctype html>
<!--
  Source design for the macOS DMG background. Rendered at 1320×800 (2×) and
  downscaled by build-art.mjs to the REQUIRED 660×400 — Finder maps 1 background
  pixel → 1 window point and does NOT scale, so the final asset must be exactly
  the window's point size.
  Finder draws the icon labels ("GG Coder", "Applications") itself, in BLACK,
  regardless of the user's Dark Mode. So each icon sits on a LIGHT rounded tile
  tall enough to also sit under its label — guaranteeing readable black text on
  an otherwise dark, on-brand background.
  Icon centers: app at 2×(360,340)=(180,170), Applications at 2×(960,340)=
  (480,170) — matching appPosition / applicationFolderPosition in
  tauri.conf.json. Regenerate with: pnpm --filter gg-app installer:art
-->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --text: #f4f6f8;
        --muted: #aeb6c4;
        --dim: #6b7482;
        --blue: #4d9dff;
        --purple: #9b8cf7;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1320px;
        height: 800px;
        overflow: hidden;
        font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
      }
      .stage {
        position: relative;
        width: 1320px;
        height: 800px;
        background:
          radial-gradient(
            120% 90% at 50% -10%,
            rgba(77, 157, 255, 0.18),
            transparent 55%
          ),
          radial-gradient(
            90% 70% at 50% 120%,
            rgba(155, 140, 247, 0.14),
            transparent 60%
          ),
          linear-gradient(180deg, #12141b 0%, #0d0f14 100%);
        color: var(--text);
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(120% 80% at 50% 25%, #000 30%, transparent 80%);
      }
      .header {
        position: absolute;
        top: 70px;
        left: 0;
        right: 0;
        text-align: center;
      }
      .wordmark {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .wordmark .g {
        background: linear-gradient(135deg, var(--blue), var(--purple));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub {
        margin-top: 12px;
        font-size: 22px;
        color: var(--muted);
        letter-spacing: 0.01em;
      }
      /*
        Light tiles behind each icon slot. Centered on the icon positions and
        tall enough that Finder's black label (drawn below the icon) lands on
        the light surface. 2× coords: center (360,340) & (960,340).
      */
      .tile {
        position: absolute;
        width: 300px;
        height: 360px; /* spans 1× y 80→260: icon (≈106-234) + label (≈238-258) */
        top: 160px; /* 340 - 180 */
        border-radius: 40px;
        background: linear-gradient(
          180deg,
          rgba(238, 240, 246, 0.96),
          rgba(222, 226, 236, 0.94)
        );
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }
      .tile.app {
        left: 210px;
      } /* 360 - 150 */
      .tile.apps {
        left: 810px;
      } /* 960 - 150 */
      .arrow {
        position: absolute;
        top: 322px;
        left: 510px; /* between the two tiles */
        width: 300px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .arrow svg {
        filter: drop-shadow(0 0 10px rgba(77, 157, 255, 0.35));
      }
      .footer {
        position: absolute;
        bottom: 50px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 18px;
        color: var(--dim);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="header">
        <div class="wordmark"><span class="g">GG</span> Coder</div>
        <div class="sub">Drag the app into your Applications folder</div>
      </div>

      <div class="tile app"></div>
      <div class="tile apps"></div>

      <div class="arrow">
        <svg width="300" height="36" viewBox="0 0 300 36" fill="none">
          <defs>
            <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="6" y1="0" x2="292" y2="0">
              <stop offset="0" stop-color="#4d9dff" stop-opacity="0.65" />
              <stop offset="1" stop-color="#9b8cf7" stop-opacity="1" />
            </linearGradient>
          </defs>
          <line x1="6" y1="18" x2="272" y2="18" stroke="url(#ag)" stroke-width="4" stroke-linecap="round" />
          <path d="M266 6 L292 18 L266 30" stroke="#9b8cf7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
      </div>

      <div class="footer">GG Coder · the coding agent, on your desktop</div>
    </div>
  </body>
</html>
